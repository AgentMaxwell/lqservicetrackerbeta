<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pack Service Tracker</title>
    <style>
      /* Tablet-Optimized Slate Theme CSS */
:root {
    --primary: #3B82F6; /* Brighter, more modern blue */
    --primary-hover: #2563EB;
    --secondary: #475569; /* Slate 600 */
    --success: #10B981; /* Emerald green - softer on the eyes */
    --danger: #EF4444; /* Red 500 */
    --bg-color: #0F172A; /* Slate 900 - removes pure black glare */
    --card-bg: #1E293B; /* Slate 800 */
    --input-bg: #334155; /* Slate 700 */
    --text-main: #F8FAFC; 
    --text-muted: #94A3B8;
    --border-color: #334155; 
    --radius-lg: 16px;
    --radius-md: 12px;
    --shadow-soft: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg-color);
    margin: 0;
    padding: 0;
    color: var(--text-main);
    -webkit-tap-highlight-color: transparent; /* Prevents default mobile flash */
}

.container {
    max-width: 1000px; /* Tighter max-width for better tablet reading lines */
    margin: 20px auto;
    background: var(--card-bg);
    padding: 24px 32px;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-soft);
    border: 1px solid rgba(255, 255, 255, 0.05);
}

/* Header */
.app-header { 
    display: flex; align-items: center; justify-content: space-between; 
    margin-bottom: 24px; padding-bottom: 16px; 
    border-bottom: 1px solid var(--border-color); 
}
.app-header h1 { margin: 0; text-align: center; flex: 1; color: var(--text-main); font-size: 1.6rem; font-weight: 700;}
.header-btn { 
    background-color: rgba(59, 130, 246, 0.1); color: var(--primary); 
    border: 1px solid rgba(59, 130, 246, 0.2); font-weight: 600; 
    cursor: pointer; padding: 12px 20px; font-size: 1rem; 
    border-radius: var(--radius-md); transition: all 0.2s ease;
}
.header-btn:active { transform: scale(0.96); background-color: rgba(59, 130, 246, 0.2); }
.header-btn.secondary { background-color: var(--input-bg); color: var(--text-main); border-color: transparent; }
.header-edge { flex: 1; display: flex; }
.header-edge.right { justify-content: flex-end; gap: 12px; }

h2, h3 { text-align: center; color: var(--text-main); margin-top: 0; margin-bottom: 20px; font-weight: 600;}

/* Inputs & Form Controls */
label { font-weight: 600; display: block; margin-bottom: 8px; font-size: 1rem; color: var(--text-muted);}
select, input, button:not(.header-btn):not(.admin-btn):not(.close-btn):not(.accordion-toggle) {
    width: 100%; padding: 16px; font-size: 1.1rem; 
    border-radius: var(--radius-md); border: 1px solid var(--border-color); 
    margin-bottom: 16px; box-sizing: border-box; 
    background-color: var(--input-bg); color: var(--text-main); 
    color-scheme: dark; transition: border-color 0.2s ease;
}
select:focus, input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }

/* Global Buttons */
button { cursor: pointer; font-weight: 600; transition: all 0.2s ease; user-select: none; }
button:active { transform: scale(0.97); } /* The "squish" effect for tablets */
.btn-primary { background-color: var(--primary); color: white; border: none; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
.btn-primary:active { background-color: var(--primary-hover); }
.btn-outline { background-color: transparent; color: var(--primary); border: 2px solid var(--primary); }
.btn-secondary { background-color: var(--secondary); color: white; border: none; }
.btn-danger { background-color: var(--danger); color: white; border: none; }
.btn-success { background-color: var(--success); color: white; border: none; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }

.app-section { display: none; }
.app-section.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

.action-group { display: flex; gap: 12px; }

/* Progress Bar */
.progress-container { width: 100%; background: var(--bg-color); border-radius: 8px; height: 12px; margin-bottom: 12px; overflow: hidden; border: 1px solid var(--border-color);}
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #60A5FA); width: 0%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
.pack-counter-text { text-align: center; color: var(--text-muted); font-weight: 600; font-size: 1rem; margin-bottom: 24px;}

/* Navigation Footer */
.nav-controls { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 16px; border-radius: var(--radius-md); margin-top: 24px; gap: 16px; border: 1px solid var(--border-color); }
.nav-controls button { flex: 1; max-width: 160px; margin: 0; padding: 16px 12px; font-size: 1.1rem; border-radius: var(--radius-md);}
.nav-status { flex: 2; display: flex; flex-direction: column; justify-content: center; text-align: center; }
.save-indicator { font-size: 0.95rem; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px;}

/* Grid Adjustments for Tablet */
#packAllOkBtn, #generalAllOkBtn { padding: 18px; margin-top: 24px; font-size: 1.1rem; border-radius: var(--radius-md); }
.parts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; transition: opacity 0.2s ease; margin-bottom: 24px;}
.grid-header { font-size: 1.1rem; font-weight: 700; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin: 32px 0 16px 0; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}

/* The Cards */
.part-section { border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 16px; background: rgba(255,255,255,0.02); display: flex; flex-direction: column;}
.part-header { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; text-align: center; color: var(--text-main);}
.button-group { display: flex; background: var(--bg-color); border-radius: var(--radius-md); padding: 4px; border: 1px solid var(--border-color);}
.btn-good, .btn-issue { flex: 1; min-height: 48px; color: var(--text-muted); background: transparent; border: none; border-radius: 10px; font-size: 1.05rem; transition: all 0.2s ease; margin: 0;}

/* Active States for Pill Toggles */
.btn-good.active { background-color: rgba(16, 185, 129, 0.15) !important; color: var(--success) !important; font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,0.2);}
.btn-issue.active { background-color: rgba(239, 68, 68, 0.15) !important; color: var(--danger) !important; font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,0.2);}

/* Notes Textarea inside Cards */
.notes-area { display: none; margin-top: 16px; animation: expandDown 0.2s ease-out;}
@keyframes expandDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
.notes-area.visible { display: block; }
.notes-area textarea { width: 100%; height: 80px; padding: 12px; font-size: 1rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-main); resize: vertical; margin-bottom: 0;}

/* Slide Out Menu */
.slide-out-menu {
    position: fixed; top: 0; right: -340px; width: 340px; height: 100%;
    background-color: var(--card-bg); box-shadow: -10px 0 30px rgba(0,0,0,0.5);
    z-index: 2000; transition: right 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
    padding: 24px; overflow-y: auto; border-left: 1px solid rgba(255,255,255,0.05); box-sizing: border-box;
}
.slide-out-menu.open { right: 0; }
.menu-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(4px); z-index: 1999; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
.menu-backdrop.show { visibility: visible; opacity: 1; }
.close-menu-btn { background: none; border: none; color: var(--text-muted); font-size: 32px; font-weight: 400; cursor: pointer; float: right; padding: 0; line-height: 1; transition: color 0.2s;}
.close-menu-btn:hover { color: var(--text-main); background: none; transform: scale(1);}

.sidebar-title { font-size: 1.1rem; font-weight: 700; color: var(--text-muted); margin-bottom: 24px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; clear: both;}
.slide-out-menu button { padding: 14px; font-size: 1.05rem; margin-bottom: 12px; border-radius: var(--radius-md); }

/* Accordions */
.accordion-toggle { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: var(--input-bg); border-radius: var(--radius-md); border: 1px solid transparent; margin-top: 16px; font-weight: 600; cursor: pointer; color: var(--text-main); transition: background 0.2s;}
.accordion-toggle:active { background: var(--border-color); }
.accordion-content { display: none; padding-top: 12px; }
.accordion-content.open { display: block; animation: fadeIn 0.2s; }
.accordion-content textarea { width: 100%; height: 120px; padding: 12px; font-size: 1rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-main); resize: vertical; margin-bottom: 12px;}

/* Modal Tables */
.modal { display: none; position: fixed; z-index: 2500; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); }
.modal-content { background-color: var(--card-bg); margin: 40px auto; padding: 32px; border-radius: var(--radius-lg); width: 95%; max-width: 1400px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-soft); position: relative; border: 1px solid rgba(255,255,255,0.05); }
.modal-close-btn { position: absolute; top: 20px; right: 24px; color: var(--text-muted); font-size: 32px; cursor: pointer; border: none; background: none;}

.table-responsive { overflow-x: auto; margin-top: 20px; border-radius: var(--radius-md); border: 1px solid var(--border-color); background: var(--bg-color); }
table { width: 100%; border-collapse: collapse; min-width: 1000px; } 
th, td { border-bottom: 1px solid var(--border-color); padding: 14px 10px; text-align: center; font-size: 0.95rem;}
th { background-color: var(--input-bg); color: var(--text-main); font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px;}
tr:nth-child(even) { background-color: rgba(255,255,255,0.02); }
.tick { color: var(--success); font-weight: bold; font-size: 1.2rem;}
.cross { color: var(--danger); font-weight: bold; font-size: 1.2rem;}
.pending { color: var(--text-muted); }
.notes-cell { text-align: left; color: #FCA5A5; max-width: 250px; font-size: 0.9rem; line-height: 1.4;}

/* Admin / Setup Tweaks */
.site-manager-item { display: flex; justify-content: space-between; align-items: center; background: var(--input-bg); border: 1px solid transparent; padding: 16px; border-radius: var(--radius-md); margin-bottom: 12px; }
.site-manager-item strong { font-size: 1.15rem; color: var(--text-main);}
.admin-controls { display: flex; gap: 8px; }
.admin-btn { padding: 10px 16px; font-size: 0.95rem; border-radius: 8px; font-weight: 600;}
.btn-edit { background-color: #F59E0B; color: white; border: none;}

/* Print remains mostly the same, just keeping the black/white overrides */
#printOnlyArea { display: none; }
@media print {
    body { background-color: white !important; color: black !important; }
    body * { visibility: hidden; }
    .slide-out-menu, .menu-backdrop { display: none !important; }
    #printOnlyArea, #printOnlyArea * { visibility: visible; }
    #printOnlyArea { display: block; position: absolute; left: 0; top: 0; width: 100%; padding: 20px; color: black; font-family: sans-serif; background: white; }
    .print-header { border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
    .print-section-title { font-size: 1.4rem; font-weight: bold; margin-top: 20px; margin-bottom: 10px; border-bottom: 1px solid #ccc; color: #000 !important;}
    .print-issue-list { margin: 0; padding-left: 20px; color: black; }
    .print-issue-list li { margin-bottom: 8px; font-size: 1.1rem;}
    h1, h2, h3 { color: black !important; }
}    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <div class="header-edge left"><button id="navHomeBtn" class="header-btn">🏠 Home</button></div>
        <h1>Pack Service Tracker</h1>
        <div class="header-edge right">
            <button id="burgerMenuBtn" class="header-btn secondary" style="display:none;">☰ Menu</button>
            <button id="fullscreenBtn" class="header-btn secondary">🔲 Full</button>
        </div>
    </div>

    <div id="setupSection" class="app-section active">
        <label for="siteSelect">Select Site to Start Service:</label>
        <select id="siteSelect">
            <option value="">Loading sites...</option>
        </select>
        
        <div id="serviceTypeSelection" style="display: none; background: #1a1a1a; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border-color);">
            <p style="text-align: center; font-size: 1.2rem; font-weight: bold; margin-top: 0; color: #fff;">Site Selected. Prepare for Service:</p>
            
            <div class="action-group" id="initialLoadGroup" style="margin-top: 20px;">
                <button class="btn-primary" id="startNewServiceBtn">Start New Service</button>
                <button class="btn-secondary" id="fetchDatesBtn">Load Previous Service</button>
            </div>
            
            <div id="dateSelectionUI" style="display: none; margin-top: 15px;">
                <label>Select Historical Service Date:</label>
                <select id="serviceDateSelect">
                    <option value="">-- Choose Date --</option>
                </select>
                <div class="action-group">
                    <button class="btn-primary" id="confirmLoadBtn">Load Selected Date</button>
                    <button class="btn-outline" id="cancelLoadBtn">Cancel</button>
                </div>
            </div>

            <div id="loadStatusMsg" style="text-align: center; font-weight: bold; margin-top: 10px;"></div>
        </div>
        <button class="btn-outline" id="toggleAdminBtn">⚙️ Manage Sites Database</button>
    </div>

    <div id="adminSection" class="app-section">
        <h2>Manage Sites Database</h2>
        <div id="adminSiteList" style="margin-bottom: 30px;"><p>Loading sites...</p></div>
        <hr style="border: 1px solid var(--border-color); margin-bottom: 20px;">
        <h3>Add New Site</h3>
        <label>Site Name:</label>
        <input type="text" id="newSiteName" placeholder="e.g. Site Delta">
        <label>Number of Packs:</label>
        <input type="number" id="newSiteCount" placeholder="e.g. 12">
        <button class="btn-primary" id="saveSiteBtn">Save New Site</button>
    </div>

    <div id="generalChecksSection" class="app-section">
        <h2>General Site Checks</h2>
        <div id="generalPartsContainer" class="parts-grid"></div>
        
        <button class="btn-success" id="generalAllOkBtn">✔ Mark Remaining as "All Good"</button>
        
        <div class="nav-controls" style="justify-content: space-between;">
            <button class="btn-primary" id="backToPacksBtn">&laquo; Back to Active Service</button>
            <div class="nav-status"><div class="save-indicator" id="generalSaveIndicator">Cloud Synced ✓</div></div>
            <div style="flex: 1; max-width: 150px;"></div>
        </div>
    </div>

    <div id="serviceSection" class="app-section">
        <div class="service-main">
            <div class="progress-container">
                <div class="progress-fill" id="progressBarFill"></div>
            </div>
            <div class="pack-counter-text" id="packCounterText">Pack 1 of X</div>

            <div class="grid-header">Pack Elements</div>
            <div id="packPartsContainer" class="parts-grid"></div>

            <div class="grid-header">Gun Elements</div>
            <div id="gunPartsContainer" class="parts-grid"></div>
            
            <button class="btn-success" id="packAllOkBtn">✔ Mark Remaining Parts as "All Good"</button>

            <div class="nav-controls">
                <button class="btn-primary" id="prevBtn" disabled>&laquo; Back</button>
                <div class="nav-status">
                    <div class="save-indicator" id="saveIndicator">Cloud Synced ✓</div>
                </div>
                <button class="btn-primary" id="nextBtn">Next &raquo;</button>
            </div>
        </div>
    </div>
</div>

<div class="menu-backdrop" id="menuBackdrop"></div>
<div class="slide-out-menu" id="slideOutMenu">
    <button class="close-menu-btn" id="closeMenuBtn">&times;</button>
    <div class="sidebar-title">Service Controls</div>
    
    <button class="btn-outline" id="sidebarGeneralChecksBtn" style="background: white; color: var(--success); border-color: var(--success);">☑️ General Site Checks</button>
    <button class="btn-outline" id="viewOverlayGridBtn" style="background: white; color: #333; border-color: #333;">📊 View Grid Overlay</button>
    <button class="btn-outline" id="sidebarPrintBtn" style="background: white; border-color: #333; color: #333;">🖨️ Print Active Report</button>
    
    <div class="accordion-toggle" id="repAccordionToggle">
        <span>👤 Representative</span>
        <span id="repAccordionIcon">▼</span>
    </div>
    <div class="accordion-content" id="repAccordionContent">
        <input type="text" id="sidebarRepNameInput" placeholder="Enter your name..." style="margin-bottom: 10px;">
        <button class="btn-primary" id="saveRepNameBtn" style="padding: 10px; font-size: 1rem;">Save Name</button>
        <div id="sidebarRepMsg" style="text-align: center; font-weight: bold; font-size: 0.9rem;"></div>
    </div>

    <div class="accordion-toggle" id="notesAccordionToggle">
        <span>📝 General Site Notes</span>
        <span id="accordionIcon">▼</span>
    </div>
    <div class="accordion-content" id="notesAccordionContent">
        <textarea id="sidebarSiteNotes" placeholder="Enter broad facility issues, missing packs, etc..."></textarea>
        <button class="btn-primary" id="saveSidebarNotesBtn" style="padding: 10px; font-size: 1rem;">Save Notes</button>
        <div id="sidebarNotesMsg" style="text-align: center; font-weight: bold; font-size: 0.9rem;"></div>
    </div>
</div>

<div id="gridOverlayModal" class="modal">
    <div class="modal-content">
        <button class="modal-close-btn" id="closeModalBtn">&times;</button>
        <h2 style="margin-top: 0;">Live Service Grid</h2>
        <div id="modalTableContainer" class="table-responsive">
            <p style="text-align: center;">Loading data...</p>
        </div>
    </div>
</div>

<div id="printOnlyArea"></div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, addDoc, setDoc, getDoc, getDocs, doc, updateDoc, deleteDoc, serverTimestamp, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- Expanded App State ---
    let sitesData = {}; 
    let currentSiteName = "";
    let currentRepresentative = ""; 
    let activeServiceDate = ""; 
    let totalpacks = 0;
    let currentpackIndex = 1;
    let fetchedServiceDocs = []; 
    let isDirty = false;    

    // Categorized Lists (Includes User Additions)
    const generalChecksList = ["Chargers", "Batteries", "Racks", "PC", "Music", "HSDU", "Cables"];
    const packPartsList = ["Right Shoulder", "Left Shoulder", "Front", "Back"];
    const gunPartsList = ["Trigger", "Speaker", "Button Reader", "Screen", "Laser and IR", "Rattle", "Rubber Ring Present", "Screws Present", "Numbered Sticker"];
    const allPackElements = [...packPartsList, ...gunPartsList]; 

    let generalChecksCache = {}; 
    let packDataCache = {}; 

    // DOM Elements
    const sections = document.querySelectorAll('.app-section');
    const serviceTypeSelection = document.getElementById('serviceTypeSelection');
    const gridModal = document.getElementById('gridOverlayModal');
    
    // Burger Menu Elements
    const burgerBtn = document.getElementById('burgerMenuBtn');
    const slideOutMenu = document.getElementById('slideOutMenu');
    const menuBackdrop = document.getElementById('menuBackdrop');
    const closeMenuBtn = document.getElementById('closeMenuBtn');

    // --- 0. MENU NAVIGATION & UTILITIES ---
    function toggleMenu() {
        const isOpen = slideOutMenu.classList.contains('open');
        if (isOpen) {
            slideOutMenu.classList.remove('open');
            menuBackdrop.classList.remove('show');
        } else {
            slideOutMenu.classList.add('open');
            menuBackdrop.classList.add('show');
        }
    }
    burgerBtn.addEventListener('click', toggleMenu);
    closeMenuBtn.addEventListener('click', toggleMenu);
    menuBackdrop.addEventListener('click', toggleMenu);

    async function navigateTo(sectionId) {
        if (document.getElementById('generalChecksSection').classList.contains('active')) await saveGeneralChecks();
        if (document.getElementById('serviceSection').classList.contains('active')) await triggerBackgroundSave();

        sections.forEach(sec => sec.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
        
        document.getElementById('siteSelect').value = "";
        serviceTypeSelection.style.display = 'none';
        document.getElementById('initialLoadGroup').style.display = 'flex';
        document.getElementById('dateSelectionUI').style.display = 'none';
        
        // Only show Burger Menu inside active service areas
        if (sectionId === 'serviceSection' || sectionId === 'generalChecksSection') {
            burgerBtn.style.display = 'block';
        } else {
            burgerBtn.style.display = 'none';
            slideOutMenu.classList.remove('open');
            menuBackdrop.classList.remove('show');
        }

        if(sectionId === 'adminSection') renderAdminList();
    }

    document.getElementById('navHomeBtn').addEventListener('click', () => navigateTo('setupSection'));
    document.getElementById('toggleAdminBtn').addEventListener('click', () => navigateTo('adminSection'));

    const fullscreenBtn = document.getElementById('fullscreenBtn');
    fullscreenBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch((err) => console.log(err));
            fullscreenBtn.innerHTML = '🗗 Exit Full';
        } else {
            document.exitFullscreen();
            fullscreenBtn.innerHTML = '🔲 Full';
        }
    });

    // --- 1. INITIALIZATION ---
    window.addEventListener('DOMContentLoaded', () => {
        const savedName = localStorage.getItem('inspectorName');
        if(savedName) {
            currentRepresentative = savedName;
            document.getElementById('sidebarRepNameInput').value = savedName;
        }
        loadSites();
    });

    async function loadSites() {
        const select = document.getElementById('siteSelect');
        select.innerHTML = '<option value="">-- Choose Site --</option>';
        try {
            const querySnapshot = await getDocs(collection(db, "sites"));
            sitesData = {};
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const count = data.packCount || data.gearCount || 0; 
                sitesData[data.name] = { id: doc.id, count: count };
                select.innerHTML += `<option value="${data.name}">${data.name} (${count} Packs)</option>`;
            });
        } catch (error) { console.error(error); }
    }

    // --- 2. ADMIN CRUD ---
    function renderAdminList() {
        const listDiv = document.getElementById('adminSiteList');
        listDiv.innerHTML = '';
        if (Object.keys(sitesData).length === 0) { listDiv.innerHTML = '<p>No sites found.</p>'; return; }
        Object.keys(sitesData).forEach(siteName => {
            const siteInfo = sitesData[siteName];
            const itemDiv = document.createElement('div');
            itemDiv.className = 'site-manager-item';
            itemDiv.innerHTML = `<div><strong>${siteName}</strong><br><span style="color: #aaa;">${siteInfo.count} Packs</span></div>
                <div class="admin-controls"><button class="admin-btn btn-edit" data-id="${siteInfo.id}" data-name="${siteName}" data-count="${siteInfo.count}">Edit</button><button class="admin-btn btn-del" data-id="${siteInfo.id}" data-name="${siteName}">Delete</button></div>`;
            listDiv.appendChild(itemDiv);
        });
        document.querySelectorAll('.btn-edit').forEach(btn => btn.addEventListener('click', handleEditSite));
        document.querySelectorAll('.btn-del').forEach(btn => btn.addEventListener('click', handleDeleteSite));
    }
    async function handleEditSite(e) {
        const docId = e.target.getAttribute('data-id'); const oldName = e.target.getAttribute('data-name'); const oldCount = e.target.getAttribute('data-count');
        const newName = prompt("Edit Site Name:", oldName); if (!newName) return; 
        const newCountStr = prompt("Edit Pack Count:", oldCount); if (!newCountStr) return; 
        const newCount = parseInt(newCountStr); if (!newName.trim() || isNaN(newCount) || newCount <= 0) return alert("Invalid data.");
        try { e.target.innerText = "..."; await updateDoc(doc(db, "sites", docId), { name: newName.trim(), packCount: newCount }); await loadSites(); renderAdminList(); } catch (error) { alert("Error."); }
    }
    async function handleDeleteSite(e) {
        const docId = e.target.getAttribute('data-id'); const siteName = e.target.getAttribute('data-name');
        if(confirm(`Delete "${siteName}"?`)) { try { e.target.innerText = "..."; await deleteDoc(doc(db, "sites", docId)); await loadSites(); renderAdminList(); } catch (error) { alert("Error."); } }
    }
    document.getElementById('saveSiteBtn').addEventListener('click', async () => {
        const name = document.getElementById('newSiteName').value.trim(); const count = parseInt(document.getElementById('newSiteCount').value);
        if (!name || isNaN(count) || count <= 0) return alert("Valid name/count required.");
        const btn = document.getElementById('saveSiteBtn'); btn.innerText = "Saving...";
        try { await addDoc(collection(db, "sites"), { name: name, packCount: count }); document.getElementById('newSiteName').value = ""; document.getElementById('newSiteCount').value = ""; btn.innerText = "Save New Site"; await loadSites(); renderAdminList(); } catch (error) { alert("Error."); }
    });

    // --- 3. START / LOAD SERVICE FLOW ---
    document.getElementById('siteSelect').addEventListener('change', (e) => {
        currentSiteName = e.target.value;
        if (currentSiteName) {
            totalpacks = sitesData[currentSiteName].count;
            serviceTypeSelection.style.display = 'block';
            document.getElementById('initialLoadGroup').style.display = 'flex';
            document.getElementById('dateSelectionUI').style.display = 'none';
            document.getElementById('loadStatusMsg').innerText = '';
        } else {
            serviceTypeSelection.style.display = 'none';
        }
    });

    document.getElementById('startNewServiceBtn').addEventListener('click', async () => {
        currentpackIndex = 1;
        packDataCache = {}; 
        generalChecksCache = {};
        activeServiceDate = new Date().toISOString().split('T')[0]; 
        
        await loadSidebarNotes(); 
        navigateTo('serviceSection'); // Defaulting to pack 1
        renderpackUI();
    });

    document.getElementById('fetchDatesBtn').addEventListener('click', async () => {
        const msg = document.getElementById('loadStatusMsg');
        msg.innerText = "Finding historical dates..."; msg.style.color = "var(--primary)";
        document.getElementById('initialLoadGroup').style.display = 'none';

        try {
            const q = query(collection(db, "services"), where("site", "==", currentSiteName));
            const querySnapshot = await getDocs(q);
            fetchedServiceDocs = [];
            const uniqueDates = new Set();
            querySnapshot.forEach(doc => {
                const data = doc.data(); fetchedServiceDocs.push({ id: doc.id, ...data });
                const match = doc.id.match(/\d{4}-\d{2}-\d{2}/); if (match) uniqueDates.add(match[0]);
            });

            if (uniqueDates.size === 0) {
                msg.innerText = "No previous services found."; msg.style.color = "var(--danger)";
                document.getElementById('initialLoadGroup').style.display = 'flex'; return;
            }

            const select = document.getElementById('serviceDateSelect');
            select.innerHTML = '<option value="">-- Choose Date --</option>';
            Array.from(uniqueDates).sort().reverse().forEach(date => select.innerHTML += `<option value="${date}">${date}</option>`);
            msg.innerText = "";
            document.getElementById('dateSelectionUI').style.display = 'block';

        } catch (error) { msg.innerText = "Error loading dates."; document.getElementById('initialLoadGroup').style.display = 'flex'; }
    });

    document.getElementById('cancelLoadBtn').addEventListener('click', () => {
        document.getElementById('dateSelectionUI').style.display = 'none';
        document.getElementById('initialLoadGroup').style.display = 'flex';
        document.getElementById('loadStatusMsg').innerText = "";
    });

    document.getElementById('confirmLoadBtn').addEventListener('click', async () => {
        const selectedDate = document.getElementById('serviceDateSelect').value;
        if (!selectedDate) return alert("Select a date.");
        activeServiceDate = selectedDate; 

        const serviceMap = {};
        fetchedServiceDocs.forEach(record => {
            if (record.id.includes(selectedDate)) {
                if (!serviceMap[record.packId] || (record.lastUpdated > serviceMap[record.packId].lastUpdated)) serviceMap[record.packId] = record;
            }
        });
        packDataCache = {};
        for (let i = 1; i <= totalpacks; i++) {
            if (serviceMap[`pack ${i}`]) packDataCache[i] = serviceMap[`pack ${i}`].serviceDetails;
        }

        generalChecksCache = {};
        try {
            const genDoc = await getDoc(doc(db, "general_checks", `${currentSiteName.replace(/\s+/g, '-')}-${activeServiceDate}`));
            if (genDoc.exists()) generalChecksCache = genDoc.data().checks || {};
        } catch (e) { console.log("No general checks found for this date"); }

        currentpackIndex = 1;
        await loadSidebarNotes(); 
        navigateTo('serviceSection'); // Defaulting to pack 1
        renderpackUI();
    });

    // --- 4. GENERAL CHECKS SECTION (Accessed from Burger Menu) ---
    document.getElementById('sidebarGeneralChecksBtn').addEventListener('click', () => {
        toggleMenu();
        navigateTo('generalChecksSection');
        renderGeneralChecksUI();
    });

    document.getElementById('backToPacksBtn').addEventListener('click', async () => {
        await saveGeneralChecks();
        navigateTo('serviceSection');
        renderpackUI();
    });

    function renderGeneralChecksUI() {
        const container = document.getElementById('generalPartsContainer');
        container.innerHTML = '';
        document.getElementById('generalSaveIndicator').innerText = "Cloud Synced ✓";
        document.getElementById('generalSaveIndicator').style.color = "#aaa";

        generalChecksList.forEach(item => {
            if (!generalChecksCache[item]) generalChecksCache[item] = { status: null, notes: "" };
            const data = generalChecksCache[item];
            const id = item.replace(/\s+/g, '-').toLowerCase();
            
            const div = document.createElement('div');
            div.className = 'part-section';
            div.innerHTML = `
                <div class="part-header">${item}</div>
                <div class="button-group">
                    <button class="btn-good ${data.status === 'Good' ? 'active' : ''}" data-type="general" data-part="${item}">All Good</button>
                    <button class="btn-issue ${data.status === 'Issue' ? 'active' : ''}" data-type="general" data-part="${item}">Issue</button>
                </div>
                <div class="notes-area ${data.status === 'Issue' ? 'visible' : ''}" id="notes-${id}">
                    <textarea data-type="general" data-part="${item}" placeholder="Describe issue...">${data.notes}</textarea>
                </div>
            `;
            container.appendChild(div);
        });
        attachInteractionListeners(container);
    }

    document.getElementById('generalAllOkBtn').addEventListener('click', async () => {
        generalChecksList.forEach(item => { if (generalChecksCache[item].status !== 'Issue') generalChecksCache[item].status = 'Good'; });
        renderGeneralChecksUI();
        await saveGeneralChecks();
        navigateTo('serviceSection');
        renderpackUI();
    });

    async function saveGeneralChecks() {
        document.getElementById('generalSaveIndicator').innerText = "Saving...";
        try {
            const docId = `${currentSiteName.replace(/\s+/g, '-')}-${activeServiceDate}`;
            await setDoc(doc(db, "general_checks", docId), {
                site: currentSiteName, date: activeServiceDate, checks: generalChecksCache, lastUpdated: serverTimestamp()
            }, { merge: true });
            document.getElementById('generalSaveIndicator').innerText = "Cloud Synced ✓";
            document.getElementById('generalSaveIndicator').style.color = "#aaa";
        } catch (error) { document.getElementById('generalSaveIndicator').innerText = "Sync Failed"; }
    }

    // --- 5. BURGER MENU ACCORDIONS & SETTINGS ---
    document.getElementById('saveRepNameBtn').addEventListener('click', () => {
        const repName = document.getElementById('sidebarRepNameInput').value.trim();
        const msg = document.getElementById('sidebarRepMsg');
        if(repName) { currentRepresentative = repName; localStorage.setItem('inspectorName', repName); msg.innerText = "Name Saved ✓"; msg.style.color = "var(--success)"; } 
        setTimeout(() => msg.innerText = "", 3000);
    });

    async function loadSidebarNotes() {
        const textArea = document.getElementById('sidebarSiteNotes');
        try {
            const docSnap = await getDoc(doc(db, "site_notes", `${currentSiteName.replace(/\s+/g, '-')}-${activeServiceDate}`));
            textArea.value = docSnap.exists() ? docSnap.data().notes || "" : "";
        } catch (e) { textArea.value = ""; }
    }

    document.getElementById('saveSidebarNotesBtn').addEventListener('click', async () => {
        const notes = document.getElementById('sidebarSiteNotes').value;
        const msg = document.getElementById('sidebarNotesMsg');
        try {
            await setDoc(doc(db, "site_notes", `${currentSiteName.replace(/\s+/g, '-')}-${activeServiceDate}`), { notes: notes, lastUpdated: serverTimestamp() }, { merge: true });
            msg.innerText = "Saved ✓"; msg.style.color = "var(--success)";
        } catch (e) { msg.innerText = "Error"; }
        setTimeout(() => msg.innerText = "", 3000);
    });

    // Accordion Toggle Handlers
    document.getElementById('repAccordionToggle').addEventListener('click', () => {
        const c = document.getElementById('repAccordionContent'); const i = document.getElementById('repAccordionIcon');
        c.classList.toggle('open'); i.innerText = c.classList.contains('open') ? '▲' : '▼';
    });
    document.getElementById('notesAccordionToggle').addEventListener('click', () => {
        const c = document.getElementById('notesAccordionContent'); const i = document.getElementById('accordionIcon');
        c.classList.toggle('open'); i.innerText = c.classList.contains('open') ? '▲' : '▼';
    });

    // --- 6. PRINT REPORT LOGIC ---
    document.getElementById('sidebarPrintBtn').addEventListener('click', async () => {
        toggleMenu();
        await triggerBackgroundSave();
        const printArea = document.getElementById('printOnlyArea');
        const generalNotes = document.getElementById('sidebarSiteNotes').value || "None recorded.";
        
        let nextDueDateStr = "N/A";
        if (activeServiceDate) {
            const dateParts = activeServiceDate.split('-');
            if (dateParts.length === 3) {
                const nextDateObj = new Date(parseInt(dateParts[0]), parseInt(dateParts[1]) - 1 + 9, parseInt(dateParts[2]));
                nextDueDateStr = nextDateObj.toISOString().split('T')[0];
            }
        }

        let html = `
            <div class="print-header">
                <h1>Service Issue Summary: ${currentSiteName}</h1>
                <p><strong>Service Date:</strong> ${activeServiceDate}</p>
                <p><strong>Next Service Due:</strong> ${nextDueDateStr}</p>
                <p><strong>Representative:</strong> ${currentRepresentative || "Not Specified"}</p>
                <p><strong>General Site Notes:</strong><br> ${generalNotes.replace(/\n/g, '<br>')}</p>
            </div>
        `;

        let hasGeneralIssues = false;
        let generalHtml = `<div class="print-section-title">General Site Checks</div><ul class="print-issue-list">`;
        generalChecksList.forEach(item => {
            if (generalChecksCache[item]) {
                if (generalChecksCache[item].status === 'Issue') {
                    hasGeneralIssues = true;
                    generalHtml += `<li><strong>${item}:</strong> ${generalChecksCache[item].notes || "Issue logged"}</li>`;
                } else if (generalChecksCache[item].status === 'Good') {
                    hasGeneralIssues = true;
                    generalHtml += `<li><strong>${item}:</strong> Checked all good</li>`;
                }
            }
        });
        generalHtml += `</ul>`;
        if (hasGeneralIssues) html += generalHtml;

        let gunIssuesHtml = `<div class="print-section-title">Gun Faults</div><ul class="print-issue-list">`;
        let packIssuesHtml = `<div class="print-section-title">Pack Faults</div><ul class="print-issue-list">`;
        let hasGunIssues = false;
        let hasPackIssues = false;

        for (let i = 1; i <= totalpacks; i++) {
            if (packDataCache[i]) {
                const parts = packDataCache[i];
                
                gunPartsList.forEach(part => {
                    if (parts[part] && parts[part].status === 'Issue') {
                        hasGunIssues = true;
                        gunIssuesHtml += `<li><strong>Pack ${i} (${part}):</strong> ${parts[part].notes || "Issue logged"}</li>`;
                    }
                });
                
                packPartsList.forEach(part => {
                    if (parts[part] && parts[part].status === 'Issue') {
                        hasPackIssues = true;
                        packIssuesHtml += `<li><strong>Pack ${i} (${part}):</strong> ${parts[part].notes || "Issue logged"}</li>`;
                    }
                });
            }
        }
        
        gunIssuesHtml += `</ul>`; packIssuesHtml += `</ul>`;
        if (hasGunIssues) html += gunIssuesHtml;
        if (hasPackIssues) html += packIssuesHtml;

        if (!hasGeneralIssues && !hasGunIssues && !hasPackIssues) {
            html += `<p style="color: green; font-weight: bold; margin-top:20px;">No issues recorded for this site. All Good!</p>`;
        }

        printArea.innerHTML = html;
        window.print();
    });

    // --- 7. GRID OVERLAY LOGIC ---
    document.getElementById('viewOverlayGridBtn').addEventListener('click', async () => {
        toggleMenu();
        gridModal.style.display = "block";
        const containerElement = document.getElementById('modalTableContainer');
        containerElement.innerHTML = '<p style="text-align: center;">Fetching Live Data...</p>';
        try {
            const q = query(collection(db, "services"), where("site", "==", currentSiteName));
            const querySnapshot = await getDocs(q);
            const serviceMap = {};
            querySnapshot.forEach(doc => {
                const data = doc.data();
                if (doc.id.includes(activeServiceDate)) {
                    if (!serviceMap[data.packId] || (data.lastUpdated > serviceMap[data.packId].lastUpdated)) serviceMap[data.packId] = data;
                }
            });

            const total = sitesData[currentSiteName].count;
            let tableHTML = `<table><thead><tr><th>Pack #</th>`;
            allPackElements.forEach(p => tableHTML += `<th>${p}</th>`);
            tableHTML += `<th>Notes</th></tr></thead><tbody>`;

            for (let i = 1; i <= total; i++) {
                let recordData = packDataCache[i] || (serviceMap[`pack ${i}`] ? serviceMap[`pack ${i}`].serviceDetails : null);
                
                if (recordData) {
                    let allNotes = [];
                    tableHTML += `<tr><td><strong>${i}</strong></td>`;
                    
                    allPackElements.forEach(part => {
                        const status = recordData[part]?.status;
                        if (status === 'Good') tableHTML += `<td><span class="tick">✔</span></td>`;
                        else if (status === 'Issue') {
                            if (recordData[part].notes) allNotes.push(`<strong>${part}:</strong> ${recordData[part].notes}`);
                            tableHTML += `<td><span class="cross">✘</span></td>`;
                        } else tableHTML += `<td><span class="pending">-</span></td>`;
                    });
                    
                    tableHTML += `<td class="notes-cell">${allNotes.join('<br>') || '<span style="color:#28a745;">None</span>'}</td></tr>`;
                } else {
                    tableHTML += `<tr><td><strong>${i}</strong></td><td colspan="${allPackElements.length + 1}" class="pending">Not Serviced Yet</td></tr>`;
                }
            }
            tableHTML += `</tbody></table>`;
            containerElement.innerHTML = tableHTML;
        } catch (error) { containerElement.innerHTML = '<p style="color: red;">Error.</p>'; }
    });
    document.getElementById('closeModalBtn').addEventListener('click', () => gridModal.style.display = "none");

    // --- 8. CHECKLIST SERVICE SESSION & AUTO-SAVE ---
    async function triggerBackgroundSave() {
        if (!isDirty) return; 
        const packToSave = currentpackIndex; 
        const dataToSave = packDataCache[packToSave];
        isDirty = false; 
        document.getElementById('saveIndicator').innerText = "Saving...";

        try {
            const docId = `${currentSiteName.replace(/\s+/g, '-')}-${activeServiceDate}-pack-${packToSave}`;
            let nextDueDateStr = "";
            if (activeServiceDate) {
                const dateParts = activeServiceDate.split('-');
                if (dateParts.length === 3) {
                    const nextDateObj = new Date(parseInt(dateParts[0]), parseInt(dateParts[1]) - 1 + 9, parseInt(dateParts[2]));
                    nextDueDateStr = nextDateObj.toISOString().split('T')[0];
                }
            }

            await setDoc(doc(db, "services", docId), {
                site: currentSiteName, packId: `pack ${packToSave}`, representative: currentRepresentative || "Not Specified",
                serviceDate: activeServiceDate, nextServiceDue: nextDueDateStr, serviceDetails: dataToSave, lastUpdated: serverTimestamp()
            });
            document.getElementById('saveIndicator').innerText = "Cloud Synced ✓";
            document.getElementById('saveIndicator').style.color = "#aaa";
        } catch (error) {
            document.getElementById('saveIndicator').innerText = "Sync Failed ✗";
            document.getElementById('saveIndicator').style.color = "var(--danger)";
            isDirty = true; 
        }
    }

    document.getElementById('prevBtn').addEventListener('click', async () => {
        await triggerBackgroundSave();
        if (currentpackIndex > 1) { currentpackIndex--; renderpackUI(); }
    });

    document.getElementById('nextBtn').addEventListener('click', async () => {
        await triggerBackgroundSave();
        if (currentpackIndex < totalpacks) { currentpackIndex++; renderpackUI(); } 
        else { alert("You have reached the end of the packs for this site."); }
    });

    document.getElementById('packAllOkBtn').addEventListener('click', async () => {
        let changed = false;
        
        if (!packDataCache[currentpackIndex]) packDataCache[currentpackIndex] = {};
        allPackElements.forEach(part => {
            if (!packDataCache[currentpackIndex][part]) packDataCache[currentpackIndex][part] = { status: null, notes: "" };
        });

        allPackElements.forEach(part => {
            if (packDataCache[currentpackIndex][part].status !== 'Issue') {
                packDataCache[currentpackIndex][part].status = 'Good';
                changed = true;
            }
        });

        if (changed) {
            isDirty = true;
            document.getElementById('saveIndicator').innerText = "Unsaved Changes...";
            document.getElementById('saveIndicator').style.color = "#aaa";
        }
        
        await triggerBackgroundSave();
        if (currentpackIndex < totalpacks) { currentpackIndex++; renderpackUI(); } 
        else { renderpackUI(); alert("All parts marked good. You are on the final pack."); }
    });

    function generatePartHTML(part, partData, typeStr) {
        const partId = part.replace(/\s+/g, '-').toLowerCase();
        return `
            <div class="part-section">
                <div class="part-header">${part}</div>
                <div class="button-group">
                    <button class="btn-good ${partData.status === 'Good' ? 'active' : ''}" data-type="${typeStr}" data-part="${part}">All Good</button>
                    <button class="btn-issue ${partData.status === 'Issue' ? 'active' : ''}" data-type="${typeStr}" data-part="${part}">Issue</button>
                </div>
                <div class="notes-area ${partData.status === 'Issue' ? 'visible' : ''}" id="notes-${partId}">
                    <textarea data-type="${typeStr}" data-part="${part}" placeholder="What is wrong & what was fixed?">${partData.notes}</textarea>
                </div>
            </div>
        `;
    }

    function renderpackUI() {
        const packContainer = document.getElementById('packPartsContainer');
        const gunContainer = document.getElementById('gunPartsContainer');
        
        // CSS Transition handles the fade out
        packContainer.style.opacity = '0';
        gunContainer.style.opacity = '0';

        setTimeout(() => {
            document.getElementById('packCounterText').innerText = `Pack ${currentpackIndex} of ${totalpacks}`;
            document.getElementById('prevBtn').disabled = currentpackIndex === 1;
            document.getElementById('nextBtn').innerText = currentpackIndex === totalpacks ? "Finish" : "Next \u00BB";
            document.getElementById('progressBarFill').style.width = `${(currentpackIndex / totalpacks) * 100}%`;
            document.getElementById('saveIndicator').innerText = "Cloud Synced ✓";
            document.getElementById('saveIndicator').style.color = "#aaa";

            if (!packDataCache[currentpackIndex]) packDataCache[currentpackIndex] = {};
            allPackElements.forEach(part => {
                if (!packDataCache[currentpackIndex][part]) packDataCache[currentpackIndex][part] = { status: null, notes: "" };
            });

            const currentData = packDataCache[currentpackIndex];
            packContainer.innerHTML = '';
            gunContainer.innerHTML = '';

            packPartsList.forEach(part => packContainer.innerHTML += generatePartHTML(part, currentData[part], 'pack'));
            gunPartsList.forEach(part => gunContainer.innerHTML += generatePartHTML(part, currentData[part], 'pack'));

            attachInteractionListeners(packContainer);
            attachInteractionListeners(gunContainer);
            
            // Allow DOM to update before fading in
            requestAnimationFrame(() => {
                packContainer.style.opacity = '1';
                gunContainer.style.opacity = '1';
            });
        }, 200); 
    }

    function attachInteractionListeners(container) {
        const buttons = container.querySelectorAll('button');
        const textareas = container.querySelectorAll('textarea');

        buttons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const type = e.target.getAttribute('data-type');
                const part = e.target.getAttribute('data-part');
                const isGoodBtn = e.target.classList.contains('btn-good');
                const partId = part.replace(/\s+/g, '-').toLowerCase();
                const notesArea = container.querySelector(`#notes-${partId}`);
                
                const siblings = e.target.parentElement.querySelectorAll('button');
                siblings.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                if (isGoodBtn) {
                    notesArea.classList.remove('visible');
                    notesArea.querySelector('textarea').value = "";
                } else {
                    notesArea.classList.add('visible');
                }

                if (type === 'general') {
                    generalChecksCache[part].status = isGoodBtn ? "Good" : "Issue";
                    if(isGoodBtn) generalChecksCache[part].notes = "";
                    document.getElementById('generalSaveIndicator').innerText = "Unsaved Changes";
                    document.getElementById('generalSaveIndicator').style.color = "#aaa";
                } else {
                    packDataCache[currentpackIndex][part].status = isGoodBtn ? "Good" : "Issue";
                    if(isGoodBtn) packDataCache[currentpackIndex][part].notes = "";
                    isDirty = true;
                    document.getElementById('saveIndicator').innerText = "Unsaved Changes...";
                    document.getElementById('saveIndicator').style.color = "#aaa";
                }
            });
        });

        textareas.forEach(ta => {
            ta.addEventListener('input', (e) => {
                const type = e.target.getAttribute('data-type');
                const part = e.target.getAttribute('data-part');
                
                if (type === 'general') {
                    generalChecksCache[part].notes = e.target.value;
                    document.getElementById('generalSaveIndicator').innerText = "Unsaved Changes";
                    document.getElementById('generalSaveIndicator').style.color = "#aaa";
                } else {
                    packDataCache[currentpackIndex][part].notes = e.target.value;
                    isDirty = true;
                    document.getElementById('saveIndicator').innerText = "Unsaved Changes...";
                    document.getElementById('saveIndicator').style.color = "#aaa";
                }
            });
            ta.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); } });
        });
    }

</script>
</body>
</html>
